<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Vehículos | AutoMétrica</title>
    <link rel="stylesheet" href="css/gestion-vehiculos.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
</head>

<body>
    <div class="main-content">
        <div class="header">
            <h1>Gestión de Vehículos</h1>
            
            <button class="btn-nuevo">
                + Nuevo Vehículo
            </button>
        </div>
        
        <div class="card">
            <h2>Registro de Vehículo</h2>
            
            <div class="form-grid">
                <div>
                    <label>Placa</label>
                    <input type="text" placeholder="ABC-123">
                </div>
                
                <div>
                    <label>Marca</label>
                    <input type="text" placeholder="Mazda">
                </div>
                
                <div>
                    <label>Modelo</label>
                    <input type="text" placeholder="Mazda 3">
                </div>
                
                <div>
                    <label>Año</label>
                    <input type="number" placeholder="2022">
                </div>
                
                <div>
                    <label>Color</label>
                    <input type="text" placeholder="Blanco">
                </div>
                
                <div>
                    <label>Kilometraje</label>
                    <input type="number" placeholder="45000">
                </div>
            </div>
            
            <button class="btn-guardar">
                Guardar Vehículo
            </button>
        
        </div>
        
        <div class="card">
            <h2>Vehículos Registrados</h2>
            <table>
                <thead>
                    <tr>
                        <th>Placa</th>
                        <th>Marca</th>
                        <th>Modelo</th>
                        <th>Estado</th>
                    </tr>
                </thead>
                
                <tbody>
                    <tr>
                        <td>ABC-123</td>
                        <td>Mazda</td>
                        <td>Mazda 3</td>
                        <td><span class="activo">Activo</span></td>
                    </tr>
                    
                    <tr>
                        <td>XYZ-789</td>
                        <td>Chevrolet</td>
                        <td>Onix</td>
                        <td><span class="reparacion">En Taller</span></td>
                    </tr>
                </tbody>
            
            </table>

        </div>

    </div>
</body>
</html>
